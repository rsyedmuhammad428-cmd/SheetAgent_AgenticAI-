# Use Docker's internal DNS resolver
# This is the KEY fix — tells nginx to resolve upstream names at runtime
# instead of at startup, so backend:8000 resolves even if backend starts late
resolver 127.0.0.11 valid=10s ipv6=off;

# Rate limit zones — Optimized for interactive agent communication
limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=20r/m;

server {
    listen 80;
    server_name _;

    client_max_body_size 55M;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Frontend (TanStack Start / Nitro on port 3000) ────────────────────────
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # ── Upload ────────────────────────────────────────────────────────────────
    location /api/upload/ {
        limit_req zone=upload burst=10 nodelay;
        client_max_body_size 55M;

        set $backend_upstream http://backend:8000;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Accept, Authorization, Content-Type';
            return 204;
        }

        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # ── All other API routes (Optimized for AI Streaming) ────────────────────
    location /api/ {
        limit_req zone=api burst=40 nodelay;

        set $backend_upstream http://backend:8000;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Accept, Authorization, Content-Type';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CRUCIAL STREAMING SETUP: Prevents Nginx from buffering chat tokens
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Long timeouts to support multi-agent thought reasoning blocks
        proxy_read_timeout 300s;
        proxy_connect_timeout 15s;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Accept, Authorization, Content-Type' always;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Health ────────────────────────────────────────────────────────────────
    location /health {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        access_log off;
    }

    location /ready {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        access_log off;
    }

    # ── Docs ──────────────────────────────────────────────────────────────────
    location /docs {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
    }
}