services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sheetagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-sheetagent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sheetagent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sheetagent_net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sheetagent_net

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"

    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sheetagent}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-sheetagent}
      - REDIS_URL=redis://redis:6379/0
      - WORKSPACE_PATH=/app/workspace
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-me}
      - AUTH_SECRET=${AUTH_SECRET:-sheetagent-super-secret-change-me}
      - TOKEN_EXPIRE_HOURS=${TOKEN_EXPIRE_HOURS:-72}
      - CORS_ORIGINS=["http://localhost","http://localhost:5173","http://localhost:80"]
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SENTRY_DSN=${SENTRY_DSN:-}
    volumes:
      - workspace_data:/app/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      - sheetagent_net

  # ── Frontend ────────────────────────────────────────────────────────────────
# ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    # FIXED: Using a more resilient shell-wrapped curl command for the internal build port
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - sheetagent_net

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - sheetagent_net

volumes:
  postgres_data:
  redis_data:
  workspace_data:

networks:
  sheetagent_net:
    driver: bridge